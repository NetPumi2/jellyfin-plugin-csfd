version: "1.0.0.4"
targetAbi: "10.11.6.0"
framework: "net9.0"
owner: "NetPumi2"
overview: "Zobrazí ČSFD hodnocení (v %) u filmů a seriálů."
description: >
  Při refreshi metadat vyhledá film/seriál na ČSFD podle názvu a roku a jeho procentuální
  hodnocení přidá jako tag "ČSFD: NN%", viditelný na detailu položky v Jellyfin UI. Vyžaduje
  platnou session cookie z csfd.cz kvůli Anubis anti-bot ochraně - viz README.
category: "Metadata"
artifacts:
- "Jellyfin.Plugin.Csfd.dll"
- "HtmlAgilityPack.dll"
changelog: >
  1.0.0.4
  - Fix: search results now prefer the result whose year matches the item's production year,
    instead of always taking the first result in the section. ČSFD often lists several
    unrelated titles sharing a name (remakes, unrelated foreign films) - without year matching,
    the wrong film/series could be picked (or, if the wrong one happened to be unrated, no tag
    at all). Falls back to the first result if no year match is found, same as before.
  - Add much more detailed Info-level logging (search URL, resolved ČSFD link, found rating or
    reason it wasn't set, whether the tag was added) so future issues can be diagnosed directly
    from the Jellyfin log without guessing.

  1.0.0.3
  - Fix: implement IHasItemChangeMonitor so a plain "Scan Library" picks up items that never
    got a ČSFD rating (or whose cached rating expired) without needing a "Replace all metadata"
    refresh. Custom metadata providers are otherwise skipped for already-imported items unless
    they report a change themselves.

  1.0.0.2
  - Change: store the ČSFD rating as a "ČSFD: NN%" tag instead of CriticRating. CriticRating is
    a single shared field that other rating plugins (e.g. Rotten Tomatoes/OMDb) also write to,
    so whichever provider ran last silently won - the ČSFD value never reliably showed up. Tags
    are additive and display as plain text on the item detail page.

  1.0.0.1
  - Fix: build against Jellyfin.Controller/Jellyfin.Model 10.11.6 to match the target server's
    ABI exactly. The 1.0.0.0 build (against 10.11.11) caused a NotSupported/TypeLoadException
    on 10.11.6 servers due to a binary incompatibility between patch versions.

  1.0.0.0
  - Initial release: ČSFD rating lookup for movies and series via CriticRating.
